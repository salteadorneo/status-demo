name: Status Check & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'config.yml'
      - 'config.json'
      - 'index.js'
      - 'lib/**'
      - 'src/**'
      - '.github/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run checks & generate HTML
        env:
          IS_TEMPLATE: ${{ secrets.IS_TEMPLATE }}
        run: node index.js

      - name: Check for service incidents
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { manageIssues } = await import('${{ github.workspace }}/manage-issues.js');
              await manageIssues(github, context);
            } catch (error) {
              console.log(`⚠️ Could not manage issues: ${error.message}`);
            }

      - name: Commit and push changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update status [skip ci]"
          git push

      - name: Configure GitHub Pages
        id: configure-pages
        continue-on-error: true
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        if: steps.configure-pages.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
